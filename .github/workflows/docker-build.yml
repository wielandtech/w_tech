name: Build and Push Docker Image

on:
  push:
    branches:
      - "**"
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: homelab-dind-w-tech
    
    steps:
    - uses: actions/checkout@v6
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Set version vars
      id: vars
      run: |
        DATE=$(date +'%Y%m%d')
        TIME=$(date +'%H%M%S')
        SHA=$(git rev-parse --short HEAD)
        echo "date=$DATE" >> $GITHUB_OUTPUT
        echo "time=$TIME" >> $GITHUB_OUTPUT
        echo "sha=$SHA" >> $GITHUB_OUTPUT
        echo "event_name=${{ github.event_name }}" >> $GITHUB_OUTPUT
        echo "ref=${{ github.ref }}" >> $GITHUB_OUTPUT
        if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
          VERSIONED_TAG="ghcr.io/wielandtech/w_tech:${DATE}-${TIME}-${SHA}"
          echo "release_tag=${DATE}-${TIME}-${SHA}" >> $GITHUB_OUTPUT
          echo "versioned_tag=${VERSIONED_TAG}" >> $GITHUB_OUTPUT
          echo "Created versioned tag: ${VERSIONED_TAG}"
        elif [ "${{ github.event_name }}" == "push" ]; then
          DEV_TAG="ghcr.io/wielandtech/w_tech:dev-${DATE}-${TIME}-${SHA}"
          echo "dev_tag=dev-${DATE}-${TIME}-${SHA}" >> $GITHUB_OUTPUT
          echo "Created dev tag: ${DEV_TAG}"
        else
          echo "Skipping registry promotion tag (not a push event)"
        fi
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ghcr.io/wielandtech/w_tech
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
          type=raw,value=${{ steps.vars.outputs.release_tag }},enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          type=raw,value=${{ steps.vars.outputs.dev_tag }},enable=${{ github.event_name == 'push' && github.ref != 'refs/heads/main' }}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      id: build
      with:
        context: .
        push: ${{ github.event_name != 'pull_request' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
