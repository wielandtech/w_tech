<div class="footer">
    <div class="footer-content">
        <!-- Wind Compass Rose (Left) -->
        <div class="footer-left">
            <div class="wind-compass" id="wind-compass">
                <svg viewBox="0 0 100 100" class="compass-rose">
                    <!-- Compass circle -->
                    <circle cx="50" cy="50" r="45" class="compass-circle"/>
                    <!-- Cardinal directions -->
                    <text x="50" y="12" class="cardinal">N</text>
                    <text x="88" y="54" class="cardinal">E</text>
                    <text x="50" y="96" class="cardinal">S</text>
                    <text x="12" y="54" class="cardinal">W</text>
                    <!-- Wind arrow (rotates based on direction) -->
                    <g id="wind-arrow" transform="rotate(0, 50, 50)">
                        <polygon points="50,15 45,40 50,35 55,40" class="arrow"/>
                    </g>
                </svg>
                <div class="wind-info">
                    <span><span id="wind-speed">--</span> mph</span>
                    <span id="wind-cardinal">--</span>
                </div>
            </div>
        </div>
        
        <!-- Company Name (Center) -->
        <div class="footer-center">
            <h3>VLAN Technology Services LLC 2025</h3>
        </div>
        
        <!-- Temperature (Right) -->
        <div class="footer-right">
            <span class="weather-temp-display">
                <span class="weather-icon">🌡️</span>
                <span id="weather-temp">--</span>°F
            </span>
        </div>
    </div>
</div>

<script>
function updateWeather() {
    fetch('/api/weather/')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ok') {
                // Update temperature
                document.getElementById('weather-temp').textContent = data.temperature_f;
                
                // Update wind speed
                if (data.wind_speed_mph !== null) {
                    document.getElementById('wind-speed').textContent = data.wind_speed_mph;
                }
                
                // Update wind direction cardinal
                if (data.wind_direction_cardinal) {
                    document.getElementById('wind-cardinal').textContent = data.wind_direction_cardinal;
                }
                
                // Rotate compass arrow to wind direction
                if (data.wind_direction !== null) {
                    const arrow = document.getElementById('wind-arrow');
                    if (arrow) {
                        arrow.setAttribute('transform', `rotate(${data.wind_direction}, 50, 50)`);
                    }
                }
            }
        })
        .catch(err => console.log('Weather fetch error:', err));
}
updateWeather();
setInterval(updateWeather, 60000);  // Update every minute
</script>
