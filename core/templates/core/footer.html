<div class="footer">
    <div class="footer-content">
        <h3>VLAN Technology Services LLC 2025</h3>
        <span class="footer-weather" id="footer-weather">
            <span class="weather-icon">🌡️</span>
            <span id="weather-temp">--</span>°F
            <span class="weather-location">Norton Shores, MI</span>
        </span>
    </div>
</div>

<script>
function updateWeather() {
    fetch('/api/weather/')
        .then(response => response.json())
        .then(data => {
            if (data.status === 'ok') {
                document.getElementById('weather-temp').textContent = data.temperature_f;
            }
        })
        .catch(err => console.log('Weather fetch error:', err));
}
updateWeather();
setInterval(updateWeather, 60000);  // Update every minute
</script>
